service:
  name: shadowd
  logLevel: info

feishu:
  cliBin: lark-cli
  eventKey: im.message.receive_v1
  identity: bot
  allowedUsers: []
  allowedChats: []
  requireMentionInGroup: false
  dryRunReply: false

github:
  enabled: false
  agentName: shadow
  daemonName: shadowd
  assignee: shadow
  commentCommand: "@shadow"
  allowedCommentCommands:
    - "@shadow"
    - "@shadow fix"
    - "@shadow continue"
    - "@shadow test"
    - "@shadow explain"
  webhook:
    publicUrl: https://smart-shadow.bozhi.ai/channels/github/webhook
    host: 127.0.0.1
    port: 8787
    path: /channels/github/webhook
    secretEnv: SMART_SHADOW_GITHUB_WEBHOOK_SECRET
  repositories:
    - longbiaochen/smart-shadow
  repos:
    longbiaochen/smart-shadow:
      localPath: /Users/longbiao/Projects/smart-shadow
      defaultBase: main
      allowedSenders:
        - longbiaochen
      testCommand: pnpm test:shadowd
      codexSandbox: workspace-write
  events:
    - issues
    - issue_comment
  dryRunReply: true

codex:
  appServer:
    command: codex
    args:
      - app-server
      - --stdio
  model: gpt-5.5
  defaultCwd: /Users/longbiao/Projects/smart-shadow
  mainProjectKey: smart-shadow
  dispatcherThreadTitle: shadowd-router
  approvalPolicy: unlessTrusted
  sandbox: workspaceWrite

routing:
  maxCandidateThreads: 10
  confidenceThreshold: 0.6

registry:
  path: .smart-shadow/registry.json
